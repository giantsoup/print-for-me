<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Invite User | THE LUMINOUS LAYER</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filament-glow {
            box-shadow: 0 0 20px rgba(161, 255, 194, 0.15);
        }
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#0e0e0e] z-50">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00FF9C]" data-icon="door_open">door_open</span>
<span class="text-xl font-bold tracking-tighter text-[#00FF9C] font-['Space_Grotesk']">THE LUMINOUS LAYER</span>
</div>
<button class="text-gray-500 hover:text-[#00FF9C] transition-colors p-2 scale-95 active:duration-100">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-6 pt-8 pb-24">
<!-- Hero Branding Section -->
<div class="mb-12">
<h1 class="font-headline text-4xl font-bold tracking-tighter text-on-surface mb-2">Invite a user</h1>
<p class="font-body text-on-surface-variant text-sm leading-relaxed max-w-xs">
                Grant access to the private workshop. New members receive a unique filament-key via email.
            </p>
</div>
<!-- Form Container -->
<div class="space-y-8">
<!-- Email Input Field -->
<div class="space-y-2">
<label class="font-headline text-xs font-medium uppercase tracking-widest text-primary-dim px-1" for="email">
                    Member Email
                </label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-t-none rounded-b-lg p-4 text-on-surface placeholder:text-outline focus:ring-0 focus:outline-none transition-all border-b-2 border-transparent focus:border-primary-dim" id="email" placeholder="artisan@luminous.layer" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary-dim transition-colors">
<span class="material-symbols-outlined" data-icon="alternate_email">alternate_email</span>
</div>
</div>
</div>
<!-- Role Selection (Bento Style Suggestion) -->
<div class="space-y-3">
<label class="font-headline text-xs font-medium uppercase tracking-widest text-primary-dim px-1">
                    Access Tier
                </label>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col gap-2 p-4 bg-surface-container-low rounded-xl text-left border border-primary/20 bg-primary/5 transition-all">
<span class="material-symbols-outlined text-primary" data-icon="token" style="font-variation-settings: 'FILL' 1;">token</span>
<div>
<p class="text-sm font-bold text-on-surface">Artisan</p>
<p class="text-[10px] text-on-surface-variant">Standard 3D access</p>
</div>
</button>
<button class="flex flex-col gap-2 p-4 bg-surface-container-low rounded-xl text-left hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-outline" data-icon="shield">shield</span>
<div>
<p class="text-sm font-bold text-on-surface">Overseer</p>
<p class="text-[10px] text-on-surface-variant">Admin privileges</p>
</div>
</button>
</div>
</div>
<!-- Note Section (Contextual) -->
<div class="bg-surface-container rounded-xl p-5 border-l-2 border-secondary/40 flex gap-4">
<span class="material-symbols-outlined text-secondary shrink-0" data-icon="info">info</span>
<p class="text-xs text-on-surface-variant font-body leading-relaxed">
                    Invites expire in 48 hours. The user will be added to the <span class="text-on-surface">#general</span> channel automatically.
                </p>
</div>
</div>
<!-- Sticky Bottom Action (But not in a bar) -->
<div class="mt-auto pt-10">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-5 rounded-full flex items-center justify-center gap-2 filament-glow active:scale-[0.98] transition-all tracking-tight uppercase">
<span>Send Invite</span>
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
<p class="text-center text-[10px] text-outline mt-4 font-label tracking-wide uppercase">
                Authorized Admin Session: 0x9f...a12
            </p>
</div>
</main>
<!-- Visual Element: Filament Path (Atmospheric) -->
<div class="fixed bottom-0 left-0 w-full h-[2px] bg-surface-container-highest overflow-hidden">
<div class="h-full bg-primary w-1/3 filament-glow relative animate-pulse" style="left: 60%">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-white blur-[4px]"></div>
</div>
</div>
<!-- Hidden UI Shell suppression as per Rule: Linear/Transactional screens suppress nav -->
<!-- (No BottomNavBar or SideNav rendered for this focused task) -->
</body></html>
